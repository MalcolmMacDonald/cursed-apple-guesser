name: Deploy to GitHub Pages (prod)

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages-prod'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - run: bun install

      - run: bun run build

      - run: echo "map-trainer.lloc.ca" > dist/CNAME

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: false
          clean-exclude: |
            dev/
