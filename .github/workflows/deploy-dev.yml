name: Deploy to GitHub Pages (dev)

on:
  push:
    branches: [ 'dev' ]
  workflow_run:
    workflows: [ 'Claude Feature Development' ]
    types: [ completed ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages-dev'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - run: bun install

      - name: Build (dev subpath)
        run: NODE_ENV=development bun run build
        env:
          VITE_BASE_PATH: /dev/

      - run: echo "map-trainer.lloc.ca/dev/" > dist/CNAME

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: dev
          clean: true
