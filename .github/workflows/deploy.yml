name: Deploy Pages

on:
  workflow_run:
    workflows: ["Build Main", "Build Dev"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download main artifact
        uses: dawidd6/action-download-artifact@v8
        with:
          name: site-main

      - name: Download dev artifact
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: build-dev.yml
          name: site-dev

      - name: Combine
        run: |
          mkdir -p public

          # Root (main)
          cp -r main/* public/

          # Dev
          mkdir -p public/dev
          cp -r dev/* public/dev/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
