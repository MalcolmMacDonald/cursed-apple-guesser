name: Promote dev → prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to create a dev → main promotion PR'
        required: true
        default: 'no'

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    if: github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create promotion branch and PR
        run: |
          BRANCH="promote/$(date -u '+%Y-%m-%d')"
          git checkout -b "$BRANCH" origin/dev
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Promote dev → main ($(date -u '+%Y-%m-%d'))" \
            --body "Automated promotion of dev to production. Review and merge to deploy." \
            --label "promotion"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
